name: Agente de oportunidades (eBay)

on:
  schedule:
    - cron: "0 11 * * *"   # todos los días ~08:00 Argentina (11:00 UTC)
  workflow_dispatch: {}      # permite correrlo a mano desde la pestaña Actions

permissions:
  contents: write            # para guardar seen.json (dedupe entre corridas)

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Buscar oportunidades y enviarlas a SharePoint
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          FLOW_CANDIDATOS_URL: ${{ secrets.FLOW_CANDIDATOS_URL }}
        run: python3 tools/market_agent/ebay_scan.py

      - name: Guardar candidatos como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: candidatos
          path: tools/market_agent/out/*.json
          if-no-files-found: warn
          retention-days: 14

      - name: Persistir dedupe (seen.json)
        run: |
          if [[ -n "$(git status --porcelain tools/market_agent/seen.json)" ]]; then
            git config user.name "nexolibre-agent"
            git config user.email "agent@users.noreply.github.com"
            git add tools/market_agent/seen.json
            git commit -m "Agente: actualizar dedupe (seen.json) [skip ci]"
            git pull --rebase --autostash origin main || true
            git push || echo "push falló (se reintenta la próxima corrida)"
          else
            echo "sin cambios en seen.json"
          fi
